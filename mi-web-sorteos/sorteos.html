<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteios — Casa Dos Frios</title>
    <link rel="stylesheet" href="assets/app.css">
</head>
<body>

<header class="site-header">
    <h1 id="siteName">🔥 CASA DOS FRIOS SORTEIOS 🔥</h1>
    <p id="welcomeMsg">Bem-vindo! Escolha seu sorteio abaixo</p>
</header>

<main class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px;">
        <p style="font-size:0.85rem;color:var(--text-muted);">Sorteios disponíveis e encerrados</p>
        <button type="button" class="btn btn-sm btn-secondary" id="btnSair" style="width:auto;">Sair da conta</button>
    </div>

    <h2 class="section-title">
        Sorteios Disponíveis
        <span class="badge" id="countActivos">0</span>
    </h2>
    <div class="sorteos-grid" id="gridActivos">
        <div class="empty-state">Carregando sorteios...</div>
    </div>

    <h2 class="section-title">
        Sorteios Finalizados
        <span class="badge" id="countFinalizados">0</span>
    </h2>
    <div class="sorteos-grid" id="gridFinalizados">
        <div class="empty-state">Nenhum sorteio finalizado ainda.</div>
    </div>
</main>

<footer class="site-footer">Pagamentos seguros via PIX · Sorteios transparentes</footer>

<script>
    var STORAGE_KEY = "cdf_cliente";

    function getCliente() {
        try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)); } catch (e) { return null; }
    }

    var cliente = getCliente();
    if (!cliente) {
        location.replace("index.html");
    } else {
        document.getElementById("welcomeMsg").textContent =
            "Olá, " + cliente.nome.split(" ")[0] + "! Escolha seu sorteio abaixo";
    }

    document.getElementById("btnSair").onclick = function () {
        sessionStorage.removeItem(STORAGE_KEY);
        location.replace("index.html");
    };

    function cardImg(s, esFinalizado) {
        if (s.imagen) {
            return '<img src="' + escapeHtml(s.imagen) + '" alt="' + escapeHtml(s.titulo) + '">';
        }
        return '<span class="emoji-fallback">' + (esFinalizado ? "🏆" : "🎁") + '</span>';
    }

    function cardSorteo(s, esFinalizado) {
        var pct = s.porcentaje || 0;
        var btn = esFinalizado
            ? '<div class="ganador-box"><div style="font-size:0.75rem;color:#ffd700;">NÚMERO GANHADOR</div><div class="num">' + (s.numero_ganador || "—") + '</div></div>'
            : '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
              '<div style="font-size:0.75rem;color:#999;margin-bottom:8px;">' + pct + '% vendido · ' + (s.disponibles || 0).toLocaleString("pt-BR") + ' cotas restantes</div>' +
              '<a href="sorteo.html?id=' + encodeURIComponent(s.id) + '" class="btn">Participar Agora</a>';

        var fechaTag = s.fecha_sorteo
            ? '<span class="meta-tag">📅 ' + formatDate(s.fecha_sorteo) + '</span>'
            : '<span class="meta-tag">📅 Data a definir</span>';

        return '<article class="sorteo-card' + (esFinalizado ? " finalizado" : "") + '">' +
            '<div class="sorteo-card-img">' + cardImg(s, esFinalizado) + '</div>' +
            '<div class="sorteo-card-body">' +
            '<h3>' + escapeHtml(s.titulo) + '</h3>' +
            '<p>' + escapeHtml(s.descricao || s.premio || "") + '</p>' +
            '<div class="sorteo-meta">' +
            '<span class="meta-tag">🏅 ' + escapeHtml(s.premio || "Prêmio") + '</span>' +
            '<span class="meta-tag">R$ ' + s.precio_cota + '/cota</span>' +
            fechaTag +
            '</div>' + btn +
            '</div></article>';
    }

    function escapeHtml(t) {
        var d = document.createElement("div");
        d.textContent = t || "";
        return d.innerHTML;
    }

    function formatDate(d) {
        if (!d) return "";
        var p = d.split("-");
        return p.length === 3 ? p[2] + "/" + p[1] + "/" + p[0] : d;
    }

    function renderGrid(el, items, esFinalizado) {
        if (!items.length) {
            el.innerHTML = '<div class="empty-state">' +
                (esFinalizado ? "Nenhum sorteio finalizado ainda." : "Nenhum sorteio disponível no momento.") +
                '</div>';
            return;
        }
        el.innerHTML = items.map(function (s) { return cardSorteo(s, esFinalizado); }).join("");
    }

    fetch("api/sorteos.php")
        .then(function (r) { return r.text().then(function (t) {
            try { return JSON.parse(t); } catch (e) { throw new Error(t.substring(0, 120)); }
        }); })
        .then(function (data) {
            if (data.error) throw new Error(data.error);
            if (data.site_name) {
                document.getElementById("siteName").textContent = "🔥 " + data.site_name.toUpperCase() + " 🔥";
                document.title = "Sorteios — " + data.site_name;
            }
            document.getElementById("countActivos").textContent = (data.activos || []).length;
            document.getElementById("countFinalizados").textContent = (data.finalizados || []).length;
            renderGrid(document.getElementById("gridActivos"), data.activos || [], false);
            renderGrid(document.getElementById("gridFinalizados"), data.finalizados || [], true);
        })
        .catch(function (err) {
            document.getElementById("gridActivos").innerHTML =
                '<div class="empty-state">Erro ao carregar sorteios: ' + escapeHtml(err.message || "verifique o Apache") + '</div>';
        });
</script>
</body>
</html>
